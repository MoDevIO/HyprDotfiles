font_family             JetBrainsMono Nerd Font
font_size               13.5

disable_ligatures       no
enable_audio_bell       no

cursor_shape            block

url_style               curly

remember_window_size    no
window_padding_width    25

cursor_trail 1
cursor_trail_start_threshold    0

scrollbar_handle_opacity        0
scrollbar_track_opacity         0
scrollbar_track_hover_opacity   0
confirm_os_window_close         0
allow_remote_control yes
listen_on unix:/tmp/mykitty.socket




# Colors

# The basic colors
foreground              #D3C6AA
background              #2D353B
selection_foreground    #D3C6AA
selection_background    #82966b

# Cursor colors
cursor                  #D3C6AA
cursor_text_color       #2D353B

# URL underline color when hovering with mouse
url_color               #A7C080

# Tab bar colors
active_tab_foreground   #2D353B
active_tab_background   #A7C080
inactive_tab_foreground #859289
inactive_tab_background #384249

