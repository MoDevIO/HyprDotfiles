font_family             JetBrainsMono Nerd Font
font_size               13.5

disable_ligatures       no
enable_audio_bell       no

cursor_shape            block

url_style               curly

remember_window_size    no
window_padding_width    25

cursor_trail 1
cursor_trail_start_threshold    0

scrollbar_handle_opacity        0
scrollbar_track_opacity         0
scrollbar_track_hover_opacity   0
confirm_os_window_close         0
allow_remote_control yes
listen_on unix:/tmp/mykitty.socket




# Colors

# The basic colors
foreground              #ABB2BF
background              #1A1A1A
selection_foreground    #ABB2BF
selection_background    #9ea0a5

# Cursor colors
cursor                  #ABB2BF
cursor_text_color       #1A1A1A

# URL underline color when hovering with mouse
url_color               #D7DAE0

# Tab bar colors
active_tab_foreground   #1A1A1A
active_tab_background   #D7DAE0
inactive_tab_foreground #939393
inactive_tab_background #272727

# The 16 terminal colors

